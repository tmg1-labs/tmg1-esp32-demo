name: CI

# GitLab CI (.gitlab-ci.yml) から移行。MR / default / feature/* 相当を
# pull_request + push(main, feature/**) で再現する。
on:
  push:
    branches: [main, 'feature/**']
  pull_request:

jobs:
  # ネイティブ(デスクトップ)テスト: PlatformIO test -e native
  test_native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # codec は PlatformIO の lib_deps(git tag v0.2.0)で取得するため submodule init は不要。

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Native tests
        run: pio test -e native -v

