; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
platform_packages = framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.2.1
board = esp32dev
upload_speed = 921600
monitor_speed = 115200
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partition_table.csv
build_flags = 
	-std=gnu++17
	-mtext-section-literals
	-Os
lib_deps =
	olikraus/U8g2@^2.36.15
	https://github.com/tmg1-labs/tmg1-codec.git#v0.2.0

[env:seeed_xiao-esp32c3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
platform_packages = framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.2.1
board = seeed_xiao_esp32c3
board_build.f_cpu = 160000000L
upload_speed = 921600
monitor_speed = 115200
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partition_table.csv
build_type = release
build_unflags = -Os
build_flags = 
	-std=gnu++17
	-O3
	-D CORE_DEBUG_LEVEL=0
lib_deps =
	olikraus/U8g2@^2.36.15
	https://github.com/tmg1-labs/tmg1-codec.git#v0.2.0

[env:super-mini-k2]
extends = env:seeed_xiao-esp32c3
board = nologo_esp32c3_super_mini

[env:native]
platform = native
test_framework = unity
; src/ は Arduino 依存を含むため native ビルドから除外する
build_src_filter = -<*>
; テストファイルからライブラリ依存を検出するために deep スキャンが必要
lib_ldf_mode = deep
; native 環境では framework 互換性チェックを無効にする
lib_compat_mode = off
; codec は lib_deps 経由で取得（include/ は PlatformIO が自動で include パスに追加）
lib_deps = https://github.com/tmg1-labs/tmg1-codec.git#v0.2.0
build_flags =
	-std=gnu++17
