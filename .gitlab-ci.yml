stages:
  - test

# ネイティブ (デスクトップ) テスト: PlatformIO test -e native
test_native:
  stage: test
  image: python:3.11-slim

  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    PLATFORMIO_PACKAGES_DIR: "$CI_PROJECT_DIR/.cache/platformio"

  cache:
    key: "pio-$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
      - .cache/platformio

  before_script:
    - apt-get update -qq && apt-get install -y -qq g++
    - pip install --quiet platformio

  script:
    - pio test -e native -v

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'

# CMakeテスト: lib/tmg1-codec の独立ビルド検証
test_cmake:
  stage: test
  image: gcc:13

  variables:
    UNITY_DIR: "$CI_PROJECT_DIR/lib/tmg1-codec/vendor/unity"

  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake git
    - git clone --depth=1 https://github.com/ThrowTheSwitch/Unity.git "$UNITY_DIR"

  script:
    - cmake -B build -S lib/tmg1-codec -DCMAKE_BUILD_TYPE=Release
    - cmake --build build -- -j$(nproc)
    - cd build && ctest --output-on-failure

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
